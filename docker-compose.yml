version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: celery-playground-redis
    ports:
      - "6380:6379"  # Map host port 6380 to container port 6379 to avoid conflicts
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  redis_data:
    driver: local

