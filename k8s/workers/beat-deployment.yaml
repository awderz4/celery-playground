apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-beat
  labels:
    app: celery
    component: beat
  annotations:
    deployment.kubernetes.io/note: "CRITICAL: replicas must stay at 1. Strategy must be Recreate."
spec:
  replicas: 1                    # Rule #8: EXACTLY ONE Beat instance
  strategy:
    type: Recreate               # NEVER change to RollingUpdate
    # RollingUpdate → two Beat pods overlap for 30-60s → every task runs twice
  selector:
    matchLabels:
      app: celery
      component: beat
  template:
    metadata:
      labels:
        app: celery
        component: beat
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: beat
          image: myapp:latest
          command:
            - celery
            - "-A"
            - celery_playground
            - beat
            - "--scheduler"
            - "django_celery_beat.schedulers:DatabaseScheduler"
            - "--max-interval"
            - "30"
            - "-l"
            - info
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          envFrom:
            - configMapRef:
                name: celery-config
            - secretRef:
                name: celery-secrets

